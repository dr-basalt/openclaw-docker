services:

  openclaw-init:
    image: ghcr.io/phioranex/openclaw-docker:latest
    restart: "no"
    stdin_open: false
    tty: false
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
      - OPENCLAW_AUTH_CHOICE=${OPENCLAW_AUTH_CHOICE}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "=== OpenClaw Init ==="

        # First-time onboarding (skip if already configured)
        if [ ! -f /home/node/.openclaw/openclaw.json ]; then
          echo "Running non-interactive onboard..."
          node /app/dist/index.js onboard \
            --non-interactive \
            --accept-risk \
            --mode local \
            --auth-choice "$OPENCLAW_AUTH_CHOICE" \
            --"$OPENCLAW_AUTH_CHOICE" "$OPENCLAW_API_KEY" \
            --gateway-port 18789 \
            --gateway-bind lan \
            --skip-skills
          echo "=== Onboard complete ==="
        else
          echo "Config already exists, skipping onboard."
        fi

        # Always apply gateway config (survives redeploys)
        echo "Applying gateway config..."

        # Set token from env var if provided
        if [ -n "$OPENCLAW_GATEWAY_TOKEN" ]; then
          node /app/dist/index.js config set gateway.auth.token "$OPENCLAW_GATEWAY_TOKEN"
          echo "Gateway token set from env var."
        fi

        # Disable device pairing (allows browser access without per-device approval)
        node /app/dist/index.js config set gateway.controlUi.dangerouslyDisableDeviceAuth true

        # Add gateway HTTPS URL to allowedOrigins if provided
        if [ -n "$OPENCLAW_GATEWAY_URL" ]; then
          node /app/dist/index.js config set gateway.controlUi.allowedOrigins \
            "[\"http://localhost:18789\",\"http://127.0.0.1:18789\",\"$OPENCLAW_GATEWAY_URL\"]"
          echo "AllowedOrigins set: $OPENCLAW_GATEWAY_URL"
        fi

        echo "=== Config applied ==="
        node -e "const d=JSON.parse(require('fs').readFileSync('/home/node/.openclaw/openclaw.json')); console.log('token:', d.gateway.auth.token); console.log('dangerouslyDisableDeviceAuth:', d.gateway.controlUi.dangerouslyDisableDeviceAuth);"

  openclaw-gateway:
    image: ghcr.io/phioranex/openclaw-docker:latest
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
      - SERVICE_FQDN_OPENCLAW_GATEWAY_18789
    command: ["gateway"]
    labels:
      - traefik.enable=true
      - traefik.http.routers.openclaw-pai.rule=Host(`openclaw-pai.jarvis.hosting.infra.ori3com.cloud`)
      - traefik.http.routers.openclaw-pai.entrypoints=https
      - traefik.http.routers.openclaw-pai.tls=true
      - traefik.http.routers.openclaw-pai.tls.certresolver=letsencrypt
      - traefik.http.services.openclaw-pai.loadbalancer.server.port=18789
      - traefik.http.routers.openclaw-pai-http.rule=Host(`openclaw-pai.jarvis.hosting.infra.ori3com.cloud`)
      - traefik.http.routers.openclaw-pai-http.entrypoints=http
      - traefik.http.routers.openclaw-pai-http.middlewares=redirect-to-https@docker
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https

  socat-proxy:
    image: alpine/socat
    restart: unless-stopped
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway
    command: "TCP-LISTEN:18790,fork,bind=0.0.0.0,reuseaddr TCP:127.0.0.1:18789"

volumes:
  openclaw-data:
  openclaw-workspace:
