services:

  openclaw-init:
    image: ghcr.io/phioranex/openclaw-docker:latest
    restart: "no"
    stdin_open: false
    tty: false
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
      - OPENCLAW_AUTH_CHOICE=${OPENCLAW_AUTH_CHOICE}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-}
      - OPENCLAW_TAILSCALE_URL=${OPENCLAW_TAILSCALE_URL:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "=== OpenClaw Init ==="

        # First-time onboarding (skip if already configured)
        if [ ! -f /home/node/.openclaw/openclaw.json ]; then
          echo "Running non-interactive onboard..."
          node /app/openclaw.mjs onboard \
            --non-interactive \
            --accept-risk \
            --mode local \
            --auth-choice "$OPENCLAW_AUTH_CHOICE" \
            --"$OPENCLAW_AUTH_CHOICE" "$OPENCLAW_API_KEY" \
            --gateway-port 18789 \
            --gateway-bind lan \
            --skip-skills
          echo "=== Onboard complete ==="
        else
          echo "Config already exists, skipping onboard."
        fi

        # Always apply gateway config (survives redeploys)
        echo "Applying gateway config..."

        # Use token auth mode so internal operator (openclaw-cli) can connect with shared token
        node /app/openclaw.mjs config set gateway.auth.mode token

        # Set token from env var if provided
        if [ -n "$OPENCLAW_GATEWAY_TOKEN" ]; then
          node /app/openclaw.mjs config set gateway.auth.token "$OPENCLAW_GATEWAY_TOKEN"
          echo "Gateway token set from env var."
        fi

        # Disable device pairing (allows browser access without per-device approval)
        node /app/openclaw.mjs config set gateway.controlUi.dangerouslyDisableDeviceAuth true

        # Trust Tailscale identity headers for tokenless access from tailnet
        node /app/openclaw.mjs config set gateway.auth.allowTailscale true

        # Allow native apps (no Origin header, e.g. Android OkHttp) via Host-header fallback
        node /app/openclaw.mjs config set gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback true

        # Build allowedOrigins from env vars
        ORIGINS="[\"http://localhost:18789\",\"http://127.0.0.1:18789\""
        [ -n "$OPENCLAW_GATEWAY_URL" ] && ORIGINS="$ORIGINS,\"$OPENCLAW_GATEWAY_URL\""
        [ -n "$OPENCLAW_TAILSCALE_URL" ] && ORIGINS="$ORIGINS,\"$OPENCLAW_TAILSCALE_URL\""
        ORIGINS="$ORIGINS]"
        node /app/openclaw.mjs config set gateway.controlUi.allowedOrigins "$ORIGINS"
        echo "AllowedOrigins set: $ORIGINS"

        echo "=== Config applied ==="
        node -e "const d=JSON.parse(require('fs').readFileSync('/home/node/.openclaw/openclaw.json')); console.log('token:', d.gateway.auth.token); console.log('dangerouslyDisableDeviceAuth:', d.gateway.controlUi.dangerouslyDisableDeviceAuth); console.log('allowTailscale:', d.gateway.auth.allowTailscale);"

  tailscale:
    image: tailscale/tailscale:latest
    hostname: openclaw-pai
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /usr/local/bin/containerboot &
        BOOT_PID=$!
        echo "Waiting for tailscale to be ready..."
        until tailscale status --json 2>/dev/null | python3 -c "import sys,json; s=json.load(sys.stdin); exit(0 if s.get('BackendState')=='Running' else 1)" 2>/dev/null; do
          sleep 2
        done
        echo "Tailscale ready, configuring HTTPS serve..."
        tailscale serve --bg 18789
        tailscale serve status
        wait $BOOT_PID
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-state:/var/lib/tailscale
    labels:
      - traefik.enable=true
      - traefik.http.routers.openclaw-pai.rule=Host(`openclaw-pai.jarvis.hosting.infra.ori3com.cloud`)
      - traefik.http.routers.openclaw-pai.entrypoints=https
      - traefik.http.routers.openclaw-pai.tls=true
      - traefik.http.routers.openclaw-pai.tls.certresolver=letsencrypt
      - traefik.http.services.openclaw-pai.loadbalancer.server.port=18789
      - traefik.http.routers.openclaw-pai-http.rule=Host(`openclaw-pai.jarvis.hosting.infra.ori3com.cloud`)
      - traefik.http.routers.openclaw-pai-http.entrypoints=http
      - traefik.http.routers.openclaw-pai-http.middlewares=redirect-to-https@docker
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https

  openclaw-gateway:
    image: ghcr.io/phioranex/openclaw-docker:latest
    restart: unless-stopped
    network_mode: "service:tailscale"
    stdin_open: true
    tty: true
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
      tailscale:
        condition: service_started
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
      - SERVICE_FQDN_OPENCLAW_GATEWAY_18789
    command: ["gateway"]

  openclaw-cli:
    image: ghcr.io/phioranex/openclaw-docker:latest
    restart: unless-stopped
    network_mode: "service:tailscale"
    stdin_open: true
    tty: true
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
      openclaw-gateway:
        condition: service_started
    volumes:
      - openclaw-data:/home/node/.openclaw
    environment:
      - NODE_ENV=production
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
      - OPENCLAW_GATEWAY_URL=
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    command: ["tui"]

  socat-proxy:
    image: alpine/socat
    restart: unless-stopped
    network_mode: "service:tailscale"
    depends_on:
      - openclaw-gateway
    command: "TCP-LISTEN:18790,fork,bind=0.0.0.0,reuseaddr TCP:127.0.0.1:18789"

volumes:
  openclaw-data:
  openclaw-workspace:
  tailscale-state:
