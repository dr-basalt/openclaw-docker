services:

  openclaw-init:
    image: ghcr.io/phioranex/openclaw-docker:latest
    restart: "no"
    stdin_open: false
    tty: false
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
      - OPENCLAW_AUTH_CHOICE=${OPENCLAW_AUTH_CHOICE}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "=== OpenClaw Init ==="
        echo "Auth choice: $OPENCLAW_AUTH_CHOICE"
        
        # Skip if already configured
        if [ -f /home/node/.openclaw/openclaw.json ]; then
          echo "Config already exists, skipping onboard."
          exit 0
        fi

        echo "Running non-interactive onboard..."
        node /app/dist/index.js onboard \
          --non-interactive \
          --accept-risk \
          --mode local \
          --auth-choice "$OPENCLAW_AUTH_CHOICE" \
          --"$OPENCLAW_AUTH_CHOICE" "$OPENCLAW_API_KEY" \
          --gateway-port 18789 \
          --gateway-bind auto \
          --skip-skills \
          --flow quickstart
        
        echo "=== Onboard complete ==="
        cat /home/node/.openclaw/openclaw.json | grep -E '"token"|"model"' || true

  openclaw-gateway:
    image: ghcr.io/phioranex/openclaw-docker:latest
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    ports:
      - "18789:18789"
      - "18790:18790"
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
      - SERVICE_FQDN_OPENCLAW_GATEWAY_18789
    command: ["gateway"]

  socat-proxy:
    image: alpine/socat
    restart: unless-stopped
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway
    command: "TCP-LISTEN:18790,fork,bind=0.0.0.0,reuseaddr TCP:127.0.0.1:18789"

volumes:
  openclaw-data:
  openclaw-workspace:
