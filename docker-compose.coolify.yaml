services:

  openclaw-init:
    image: ghcr.io/phioranex/openclaw-docker:latest
    restart: "no"
    stdin_open: false
    tty: false
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
      # Provider API keys (remplis selon ton provider dans Coolify)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    entrypoint: ["node", "/app/dist/index.js"]
    command: >
      onboard --non-interactive
      --mode local
      --auth-choice ${OPENCLAW_AUTH_CHOICE}
      --${OPENCLAW_AUTH_CHOICE}-api-key ${OPENCLAW_API_KEY}
      --gateway-port 18789
      --gateway-bind all
      --skip-skills
      --flow quickstart

  openclaw-gateway:
    image: ghcr.io/phioranex/openclaw-docker:latest
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    ports:
      - "18789:18789"
      - "18790:18790"
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
    command: ["gateway"]

  socat-proxy:
    image: alpine/socat
    restart: unless-stopped
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway
    command: "TCP-LISTEN:18790,fork,bind=0.0.0.0,reuseaddr TCP:127.0.0.1:18789"

volumes:
  openclaw-data:
  openclaw-workspace:
