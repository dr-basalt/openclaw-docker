services:
  openclaw-init:
    image: 'ghcr.io/phioranex/openclaw-docker:latest'
    restart: 'no'
    entrypoint:
      - /bin/sh
      - '-c'
    volumes:
      - 'openclaw-data:/home/node/.openclaw'
      - 'openclaw-workspace:/home/node/.openclaw/workspace'
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
      - 'OPENCLAW_AUTH_CHOICE=${OPENCLAW_AUTH_CHOICE}'
      - 'OPENCLAW_API_KEY=${OPENCLAW_API_KEY}'
    command:
      - "set -e\nCONFIG=/home/node/.openclaw/openclaw.json\nif [ ! -f \"$$CONFIG\" ]; then\n  echo \"Running onboard...\"\n  node /app/dist/index.js onboard \\\n    --non-interactive \\\n    --accept-risk \\\n    --mode local \\\n    --auth-choice \"$$OPENCLAW_AUTH_CHOICE\" \\\n    --\"$$OPENCLAW_AUTH_CHOICE\" \"$$OPENCLAW_API_KEY\" \\\n    --gateway-port 18789 \\\n    --gateway-bind lan \\\n    --skip-skills \\\n    --flow quickstart\nelse\n  echo \"Config exists, skipping onboard.\"\nfi\necho \"Patching controlUi...\"\ncat > /tmp/patch.js << 'JSPATCH'\nconst fs = require('fs');\nconst p = '/home/node/.openclaw/openclaw.json';\nconst cfg = JSON.parse(fs.readFileSync(p, 'utf8'));\ncfg.gateway = cfg.gateway || {};\ncfg.gateway.controlUi = cfg.gateway.controlUi || {};\ncfg.gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback = true;\nfs.writeFileSync(p, JSON.stringify(cfg, null, 2));\nconsole.log('Patch OK');\nJSPATCH\nnode /tmp/patch.js\n"

  openclaw-gateway:
    image: 'ghcr.io/phioranex/openclaw-docker:latest'
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    volumes:
      - 'openclaw-data:/home/node/.openclaw'
      - 'openclaw-workspace:/home/node/.openclaw/workspace'
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
    command:
      - gateway

  socat-proxy:
    image: alpine/socat
    restart: unless-stopped
    network_mode: 'service:openclaw-gateway'
    depends_on:
      - openclaw-gateway
    command: 'TCP-LISTEN:18790,fork,bind=0.0.0.0,reuseaddr TCP:127.0.0.1:18789'

volumes:
  openclaw-data:
  openclaw-workspace:
