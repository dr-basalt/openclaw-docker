services:
  openclaw-init:
    image: ghcr.io/phioranex/openclaw-docker:latest
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
      - OPENCLAW_AUTH_CHOICE=${OPENCLAW_AUTH_CHOICE}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY}
    command:
      - |
        set -e
        CONFIG=/home/node/.openclaw/openclaw.json
        if [ ! -f "$$CONFIG" ]; then
          echo "Running onboard..."
          node /app/dist/index.js onboard \
            --non-interactive \
            --accept-risk \
            --mode local \
            --auth-choice "$$OPENCLAW_AUTH_CHOICE" \
            --"$$OPENCLAW_AUTH_CHOICE" "$$OPENCLAW_API_KEY" \
            --gateway-port 18789 \
            --gateway-bind lan \
            --skip-skills \
            --flow quickstart
        else
          echo "Config exists, skipping onboard."
        fi
        echo "Patching controlUi..."
        cat > /tmp/patch.js << 'JSPATCH'
        const fs = require('fs');
        const p = '/home/node/.openclaw/openclaw.json';
        const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
        cfg.gateway = cfg.gateway || {};
        cfg.gateway.controlUi = cfg.gateway.controlUi || {};
        cfg.gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback = true;
        fs.writeFileSync(p, JSON.stringify(cfg, null, 2));
        console.log('Patch OK');
        JSPATCH
        node /tmp/patch.js

  openclaw-gateway:
    image: ghcr.io/phioranex/openclaw-docker:latest
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    ports:
      - "18789:18789"
      - "18790:18790"
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
    command: ["gateway"]

  socat-proxy:
    image: alpine/socat
    restart: unless-stopped
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway
    command: "TCP-LISTEN:18790,fork,bind=0.0.0.0,reuseaddr TCP:127.0.0.1:18789"

volumes:
  openclaw-data:
  openclaw-workspace:
